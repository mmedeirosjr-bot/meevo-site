<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEVO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>MEEVO V7</h1>

<h3>Paciente</h3>
<input id="paciente" placeholder="Nome">

<h3>Setor</h3>
<select id="setor">
<option>UTI</option>
<option>Enfermaria</option>
</select>

<h3>GERAL</h3>
<select id="geral">
<option>Normal</option>
<option>EG Regular</option>
<option>EG Ruim</option>
</select>

<h3>AN</h3>
<select id="an">
<option>Vigil</option>
<option>Sonolento</option>
<option>Coma</option>
</select>

<h3>AR</h3>
<select id="ar">
<option>MV presente sem RA</option>
<option>Sibilos</option>
<option>Estertores</option>
</select>

<h3>ACV</h3>
<select id="acv">
<option>RCR 2T s/s</option>
<option>RCI</option>
<option>Sopro</option>
</select>

<h3>Conduta</h3>
<textarea id="conduta"></textarea>

<br><br>
<button onclick="salvar()">Salvar evolução</button>
<button onclick="duplicar()">Duplicar</button>
<button onclick="exportar()">Exportar PDF</button>

<h3>Histórico</h3>
<div id="lista"></div>

<script src="app.js"></script>
</body>
</html>
